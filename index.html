      const shoppingBudget = Number(input.shoppingBudget) || 0;
      const style = input.travelStyle || 'Standard';

      let destFactor = 1.0;
      let currencyFactor = 1;
      let mockAirports = { from: "HYD", to: "GOI" };

      if (dest.includes('paris') || dest.includes('london') || dest.includes('europe')) {
        destFactor = 3.5;
        mockAirports = { from: "DEL", to: "CDG" };
      } else if (dest.includes('singapore')) {
        destFactor = 2.0;
        mockAirports = { from: "BLR", to: "SIN" };
      }

      let dailyHotelBase = 1500;
      if (input.hotelPreference === 'Hostel') dailyHotelBase = 600;
      else if (input.hotelPreference === '2-Star') dailyHotelBase = 1200;
      else if (input.hotelPreference === '3-Star') dailyHotelBase = 2500;
      else if (input.hotelPreference === '5-Star') dailyHotelBase = 7000;

      let dailyFoodBase = 800;
      if (input.foodPreference.includes('Fine')) dailyFoodBase = 2000;
      else if (input.foodPreference.includes('Veg')) dailyFoodBase = 600;

      const styleModifier = style === 'Luxury' ? 2.0 : style === 'Budget' ? 0.6 : 1.0;

      // Calculate independent base fares for each transit mode
      const flightFare = Math.round((style === 'Luxury' ? 12000 : style === 'Standard' ? 6000 : 3500) * travelers * destFactor);
      const trainFare = Math.round((style === 'Luxury' ? 4500 : style === 'Standard' ? 2200 : 1000) * travelers);
      const busFare = Math.round((style === 'Luxury' ? 2500 : style === 'Standard' ? 1400 : 800) * travelers);
      const cabFare = Math.round((style === 'Luxury' ? 7000 : style === 'Standard' ? 4000 : 2000) * travelers * destFactor);

      // Set default transCost based on user preference
      const pref = input.transportPreference || 'Flight';
      let transCost = flightFare;
      if (pref === 'Train') transCost = trainFare;
      else if (pref === 'Bus') transCost = busFare;
      else if (pref === 'Cab') transCost = cabFare;
      const hotelCost = Math.round(dailyHotelBase * days * styleModifier);
      const foodCost = Math.round(dailyFoodBase * days * travelers * styleModifier);
      const localCost = Math.round((style === 'Luxury' ? 1500 : style === 'Standard' ? 600 : 200) * days * travelers * destFactor);
      const activitiesCount = (input.activityInterests || []).length || 2;
      const activitiesCost = Math.round(activitiesCount * (style === 'Luxury' ? 3500 : style === 'Standard' ? 1500 : 600) * travelers);

      const miscCost = Math.round((hotelCost + foodCost) * 0.08);
      const emergencyCost = Math.round((transCost + hotelCost) * 0.05);
      const total = transCost + hotelCost + foodCost + localCost + activitiesCost + shoppingCost + miscCost + emergencyCost;

      // Dynamic calculation of options based on destination
      const fromCity = (input.departureCity || 'Hyderabad').trim();
      const toCity = (input.destination || 'Goa').trim();

      let hotelOptions = [];
      let foodOptions = [];
      let localOptions = [];

      let toCode = toCity.slice(0, 3).toUpperCase();
      if (fromCity.toLowerCase().includes('hyderabad')) fromCode = 'HYD';
      if (fromCity.toLowerCase().includes('delhi')) fromCode = 'DEL';
      if (fromCity.toLowerCase().includes('goa')) fromCode = 'GOI';
      if (fromCity.toLowerCase().includes('mumbai')) fromCode = 'BOM';
      if (fromCity.toLowerCase().includes('bangalore')) fromCode = 'BLR';
      if (fromCity.toLowerCase().includes('chennai')) fromCode = 'MAA';
      
      if (destKey.includes('goa')) toCode = 'GOI';
      else if (destKey.includes('delhi')) toCode = 'DEL';
      else if (destKey.includes('mumbai')) toCode = 'BOM';
      else if (destKey.includes('bangalore')) toCode = 'BLR';
      else if (destKey.includes('manali')) toCode = 'BHU';
      else if (destKey.includes('shimla')) toCode = 'SLV';
      else if (destKey.includes('paris')) toCode = 'CDG';
      else if (destKey.includes('london')) toCode = 'LHR';
      else if (destKey.includes('singapore')) toCode = 'SIN';

      if (destKey.includes('goa')) {
        transOptions = [
          { name: `IndiGo Flight 6E-241 (Direct)`, type: 'Flight', time: "06:15 AM - 07:40 AM (1h 25m)", price: flightFare, details: `Direct flight. Dep: ${fromCode}, Arr: ${toCode} (Mopa GOX). Cabin bags included.` },
          { name: `Air India AI-842 (Best Value)`, type: 'Flight', time: "11:30 AM - 01:05 PM (1h 35m)", price: Math.round(flightFare * 1.1), details: `Direct flight. Dep: ${fromCode}, Arr: ${toCode}. Hot meals & 15kg checked luggage included.` },
          { name: `Goa Express Train (12780)`, type: 'Train', time: "12:45 PM - 05:40 AM (+1) (16h 55m)", price: trainFare, details: `Third AC Sleeper berths (IRCTC reservation) to Madgaon Station (MAO).` },
          { name: `IntrCity SmartBus Sleeper (A/C)`, type: 'Bus', time: "05:30 PM - 08:30 AM (+1) (15h)", price: busFare, details: `Premium A/C Sleeper, charging ports, live tracking, water bottle provided.` },
          { name: `Self-Drive SUV Rental / Road Cab`, type: 'Cab', time: "Flexible Departure", price: cabFare, details: `Private outstation door-to-door cab or self-drive vehicle from source to Goa.` }
        ];
        
        hotelOptions = [
          { name: `Zostel Goa (Vagator Hostel)`, rating: "4.6", reviews: "1.1k", time: "Check-in: 12:00 PM", price: Math.round(hotelCost * 0.4), details: `Vibrant backpacker social beds, community cafe, high-speed Wi-Fi, near Vagator beach.` },

    const handleMockUpdate = (prevBudget, prompt) => {
      const q = prompt.toLowerCase();
      let updated = JSON.parse(JSON.stringify(prevBudget));
      let responseText = "";

      if (q.includes('train') || q.includes('bus') || q.includes('flight') || q.includes('fly')) {
        const oldCost = updated.categories.transportation.cost;
        const newCost = Math.round(oldCost * 0.35);
        updated.categories.transportation.cost = newCost;
        updated.categories.transportation.explanation = "Substituted flights/premium transit with comfortable express train tickets.";
        responseText = `Switched transportation mode to train. This reduced the Flight/Transport cost from ₹${oldCost.toLocaleString()} to ₹${newCost.toLocaleString()}, saving you ₹${(oldCost - newCost).toLocaleString()}!`;
        
        // Update mock option selection dynamically
        if (updated.categories.transportation.options && updated.categories.transportation.options[2]) {
          updated.categories.transportation.options[2].price = newCost;
        }
      } else if (q.includes('cheap') || q.includes('hostel') || q.includes('hotel') || q.includes('stay') || q.includes('room')) {
        const oldCost = updated.categories.hotel.cost;
        const newCost = Math.round(oldCost * 0.65);
        updated.categories.hotel.cost = newCost;
        updated.categories.hotel.explanation = "Optimized accommodation to budget-friendly stays or hostels.";
        responseText = `I've downgraded the lodging type to cheaper alternatives. Hotel budget was optimized from ₹${oldCost.toLocaleString()} to ₹${newCost.toLocaleString()} (35% savings).`;
        if (updated.categories.hotel.options && updated.categories.hotel.options[0]) {
          updated.categories.hotel.options[0].price = newCost;
        }
      } else if (q.includes('food') || q.includes('meal') || q.includes('eat') || q.includes('veg')) {
        const oldCost = updated.categories.food.cost;
        const newCost = Math.round(oldCost * 0.7);
        updated.categories.food.cost = newCost;
        updated.categories.food.explanation = "Adjusted to street food spots and local budget diners.";
        responseText = `I adjusted your dining plan to focus on local markets and street vendor hubs, bringing food costs down by 30%.`;
        if (updated.categories.food.options && updated.categories.food.options[0]) {
          updated.categories.food.options[0].price = newCost;
        }
      } else if (q.includes('reduce') || q.includes('cut') || q.includes('decrease') || q.includes('lower') || q.includes('limit') || q.match(/\d+/)) {
        const match = q.match(/(?:to|₹|\$)\s*(\d+k|\d+,\d+|\d+)/);
        let target = 0;
        if (match) {
          let numStr = match[1].replace(/,/g, '');
          if (numStr.endsWith('k')) {
            target = parseFloat(numStr) * 1000;
          } else {
            target = parseInt(numStr);
          }
        }
        
        const currentTotal = updated.totalBudget;
        let scale = 0.8;
        if (target > 0 && target < currentTotal) {
          scale = target / currentTotal;
        }
        
        const categoriesToScale = ['transportation', 'hotel', 'food', 'localTransport', 'activities', 'miscellaneous'];
        categoriesToScale.forEach(cat => {
          updated.categories[cat].cost = Math.round(updated.categories[cat].cost * scale);
          updated.categories[cat].explanation += " (Budget scaled down to meet target limit)";
          if (updated.categories[cat].options) {
            updated.categories[cat].options.forEach(opt => {
              opt.price = Math.round(opt.price * scale);
            });
          }
        });
        
        const oldTotal = currentTotal;
        let newTotal = 0;
        Object.keys(updated.categories).forEach(cat => {
          newTotal += updated.categories[cat].cost;
        });
        updated.totalBudget = newTotal;
        
        responseText = `I have optimized and scaled down individual categories (such as transport, lodging, food, and sightseeing activities) to fit near your target. Total budget is reduced from ₹${oldTotal.toLocaleString()} to ₹${newTotal.toLocaleString()}.`;
      } else if (q.includes('water') || q.includes('sport') || q.includes('activity') || q.includes('adventure') || q.includes('fun')) {
        const oldCost = updated.categories.activities.cost;
        const newCost = oldCost + 3500;
        updated.categories.activities.cost = newCost;
        updated.categories.activities.explanation = "Added premium water sports package and cruise admissions.";
        responseText = `Added high-adrenaline water sports package and local experiences. Activity cost increased from ₹${oldCost.toLocaleString()} to ₹${newCost.toLocaleString()}.`;
        if (updated.categories.activities.options && updated.categories.activities.options[1]) {
          updated.categories.activities.options[1].price = newCost;
        }
      } else {
        responseText = "I've reviewed your request. I updated minor details and added a safety cushion to make sure your travel goals are safe and optimized.";
        updated.categories.emergencyFund.cost += 500;
        updated.categories.emergencyFund.explanation = "Increased slightly to ensure a safety cushion for custom itinerary changes.";
      }

      let total = 0;
      Object.keys(updated.categories).forEach(cat => {
        total += updated.categories[cat].cost;
      });
      updated.totalBudget = total;
      updated.aiExplanation = responseText;

      return updated;
    };

      // --- GEMINI API CALLER ---
      const callGeminiAPI = async (payload, systemPrompt, chatHistory = []) => {
        const apiKey = settings.geminiApiKey;
        if (!apiKey) throw new Error("No Gemini API key supplied");

        const contents = [];
        chatHistory.forEach(msg => {
          contents.push({
            role: msg.sender === 'user' ? 'user' : 'model',
            parts: [{ text: typeof msg.text === 'object' ? JSON.stringify(msg.text) : msg.text }]
          });
        });

        contents.push({
          role: 'user',
          parts: [{ text: JSON.stringify(payload) }]
        });

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: contents,
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { responseMimeType: "application/json" }
          })
        });

        if (!response.ok) {
          const errData = await response.json();
          throw new Error(errData.error?.message || "API request failed");
        }

        const resData = await response.json();
        const rawText = resData.candidates?.[0]?.content?.parts?.[0]?.text;
        const cleanJsonStr = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
        return JSON.parse(cleanJsonStr);

                "localTransport": { "cost": number, "explanation": "string", "options": [ { "name": "string", "time": "string", "price": number, "details": "string" } ], "bookingProcess": "string" },

                        key={idx}
                        onClick={() => handleSendChatMessage(chip.text)}
                        className="text-[10px] px-2.5 py-1 rounded-full border action-chip font-bold"
                      >
                        {chip.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Inputs Bar */}
                <div className="p-3 bg-white border-t border-slate-200 flex items-center space-x-2 shrink-0">
                  <input 
                    type="text" 
                    placeholder="e.g. Change flights to trains..." 
                    value={chatInput}
                    onChange={(e) => setChatInput(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && handleSendChatMessage()}
                    className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                  />
                  
                  <button 
                    onClick={() => handleSendChatMessage()}
                    disabled={loading || !chatInput.trim()}
                    className="w-8 h-8 rounded-lg bg-gradient-to-r from-blue-600 to-indigo-600 text-white flex items-center justify-center transition disabled:opacity-50 shrink-0 shadow-sm"
                  >
                    <Icons.Send className="w-3.5 h-3.5" />
                  </button>
                </div>

              </div>
            </>
          )}

          {/* --- SETTINGS DIALOG --- */}
          {showSettings && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">
              <div onClick={() => setShowSettings(false)} className="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

              <div className="relative w-full max-w-sm bg-white rounded-2xl border border-slate-200 shadow-2xl p-6 animate-scale-up text-slate-800">
                <div className="flex justify-between items-center pb-4 border-b border-slate-100">
                  <h3 className="text-base font-bold flex items-center gap-2">
                    <Icons.Settings className="w-5 h-5 text-blue-600" />
                    Planner Options
                  </h3>
                  <button onClick={() => setShowSettings(false)} className="p-1 rounded bg-slate-100 hover:bg-slate-200">
                    <Icons.Close className="w-5 h-5 text-slate-500" />
                  </button>
                </div>

                <form onSubmit={(e) => {
                  e.preventDefault();
                  const formData = new FormData(e.target);
                  handleSaveSettings({
                    geminiApiKey: formData.get('geminiApiKey').trim(),
                    defaultCurrency: formData.get('defaultCurrency')
                  });
                }} className="space-y-4 mt-4">
                  
                  <div>
                    <label className="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Gemini API Key</label>
                    <input 
                      type="password" 
                      name="geminiApiKey"
                      placeholder="Paste Gemini AI Key..." 
                      defaultValue={settings.geminiApiKey}
                      className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500"
                    />
                    <div className="flex justify-between items-center mt-1.5 text-[9px] text-slate-400 font-light">
                      <span>No key needed for offline Demo Mode.</span>
                      <a href="https://aistudio.google.com/" target="_blank" className="text-blue-600 hover:underline">Get Key</a>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Currency Setup</label>
                    <select 
                      name="defaultCurrency"
                      defaultValue={settings.defaultCurrency}
                      className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs text-slate-800 focus:outline-none focus:border-blue-500"
                    >
                      <option value="INR">INR (₹)</option>
                      <option value="USD">USD ($)</option>
                      <option value="EUR">EUR (€)</option>
                      <option value="GBP">GBP (£)</option>
                      <option value="JPY">JPY (¥)</option>
                      <option value="AUD">AUD (A$)</option>
                    </select>
                  </div>

                  <div className="pt-3 flex justify-end space-x-2 text-xs">
                    <button 
                      type="button"
                      onClick={() => setShowSettings(false)}
                      className="px-3.5 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600"
                    >
                      Cancel
                    </button>
                    <button 
                      type="submit"
                      className="px-4 py-2 rounded-lg bg-blue-600 text-white font-bold"
                    >
                      Save Preferences
                    </button>
                  </div>

                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
